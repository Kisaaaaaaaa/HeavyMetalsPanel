<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP-01S 设备管理 - 多参数水质实时监测与智能化分析系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0c4a6e 0%, #1e3a8a 50%, #312e81 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .main-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title h2 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .page-title p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin: 0;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.5rem;
            color: white;
        }

        .feature-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #60a5fa;
        }

        .feature-description {
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.8;
            margin-bottom: 1.5rem;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: auto;
            align-self: center;
        }

        .feature-button:hover {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            transform: translateY(-2px);
        }

        .api-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .api-section h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #60a5fa;
        }

        .api-endpoint {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-family: 'Courier New', monospace;
        }

        .api-method {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 1rem;
        }

        .method-get {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid #22c55e;
        }

        .method-post {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }

        .api-url {
            color: #fbbf24;
            font-weight: 600;
        }

        .api-description {
            margin-top: 0.5rem;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .device-status {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin: 0 auto 0.5rem;
        }

        .status-online {
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .status-offline {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .back-link {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .coming-soon {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            margin-top: 1rem;
        }

        .coming-soon-text {
            color: #f59e0b;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 1rem;
            }
            
            .feature-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .back-link {
                position: static;
                display: block;
                text-align: center;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <i class="fas fa-microchip"></i>
            ESP-01S 设备管理
        </h1>
    </div>

    <div class="main-container">
        <div class="page-title">
            <h2>
                <i class="fas fa-wifi"></i>
                ESP-01S 水质监测设备
            </h2>
            <p>通过WIFI模块实现实时水质数据采集与传输</p>
        </div>

        <!-- 功能特性 -->
        <div class="feature-grid">
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="feature-title">实时监测</div>
                <div class="feature-description">
                    通过ESP-01S WIFI模块实时采集TDS、温度、pH、浊度等基础水质参数，
                    以及18种常见金属离子浓度数据
                </div>
                <a href="/device" class="feature-button">
                    <i class="fas fa-play"></i>
                    开始监测
                </a>
            </div>

            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-database"></i>
                </div>
                <div class="feature-title">数据存储</div>
                <div class="feature-description">
                    自动将采集的水质数据存储到MySQL数据库中，
                    支持历史数据查询和趋势分析
                </div>
                <a href="/dashboard" class="feature-button">
                    <i class="fas fa-chart-bar"></i>
                    查看数据
                </a>
            </div>


            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="feature-title">AI智能分析</div>
                <div class="feature-description">
                    通过大语言模型AI分析水质数据，
                    提供专业的风险评估和改善建议
                </div>
                <a href="/ai_analysis" class="feature-button">
                    <i class="fas fa-robot"></i>
                    AI分析
                </a>
            </div>
        </div>

        <!-- 设备状态 -->
        <div class="device-status">
            <h3>
                <i class="fas fa-server"></i>
                设备连接状态
            </h3>
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-indicator status-online"></div>
                    <div>ESP-01S 模块</div>
                    <div style="font-size: 0.8rem; opacity: 0.7;">在线</div>
                </div>
                <div class="status-item">
                    <div class="status-indicator status-online"></div>
                    <div>水质传感器</div>
                    <div style="font-size: 0.8rem; opacity: 0.7;">连接成功</div>
                </div>
                <div class="status-item">
                    <div class="status-indicator status-online"></div>
                    <div>数据库服务</div>
                    <div style="font-size: 0.8rem; opacity: 0.7;">在线</div>
                </div>
                <div class="status-item">
                    <div class="status-indicator status-online"></div>
                    <div>Web服务</div>
                    <div style="font-size: 0.8rem; opacity: 0.7;">运行中</div>
                </div>
            </div>
        </div>

        

    <a href="/dashboard" class="back-link">
        <i class="fas fa-arrow-left"></i>
        返回看板
    </a>

    <script>
        // 模拟设备状态更新
        function updateDeviceStatus() {
            // 这里可以添加实际的设备状态检查逻辑
            console.log('更新设备状态...');
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            updateDeviceStatus();
            
            // 每30秒更新一次设备状态
            setInterval(updateDeviceStatus, 30000);
        });
    </script>
</body>
</html>
