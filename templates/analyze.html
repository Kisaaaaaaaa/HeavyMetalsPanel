<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据分析 - 重金属检测平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=131c82664ed5c484aedad8082e2af203"></script>
    <script src="https://webapi.amap.com/ui/1.1/main.js"></script>
    <script src="https://webapi.amap.com/ui/1.1/ui/overlay/MarkerClusterer.js"></script>
    <style>
body {
    background: linear-gradient(135deg, #10151c 0%, #1a2330 60%, #232b3a 100%) !important;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
    letter-spacing: 0.02em;
}
.analyze-container {
    width: 100vw;
    max-width: none;
    margin: 0;
    padding: 8px;
    background: rgba(24,28,36,0.97);
    min-height: 100vh;
    box-shadow: 0 4px 16px 0 rgba(31,38,135,0.10);
    backdrop-filter: blur(4px);
    border-radius: 0 0 24px 24px;
    border: 1px solid rgba(59,130,246,0.05);
    animation: floatIn 1.2s cubic-bezier(.68,-0.55,.27,1.55);
}
@keyframes floatIn {
    0% { opacity: 0; transform: translateY(40px) scale(0.98);}
    100% { opacity: 1; transform: translateY(0) scale(1);}
}
h2 {
    color: #7dd3fc;
    text-align: center;
    margin-bottom: 2.2rem;
    font-size: 2.1rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 0 0 8px #0ea5e9, 0 2px 8px #1e293b;
}
.top-section {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    gap: 1.2rem;
    margin-bottom: 1.2rem;
    height: 70vh;
}
.side-chart {
    flex: 0 0 400px;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    filter: drop-shadow(0 0 8px #33415544);
}
#charts, #exceed_chart {
    width: 100%;
    height: 500px;
    background: rgba(22,28,38,0.93);
    border-radius: 14px;
    box-shadow: 0 2px 12px 0 rgba(30,41,59,0.13), 0 1.5px 8px #33415533 inset;
    margin-bottom: 0.5rem;
    border: 1px solid #22313a;
    backdrop-filter: blur(1.5px);
    transition: box-shadow 0.3s;
}
#charts:hover, #exceed_chart:hover {
    box-shadow: 0 4px 20px 0 #33415577, 0 1.5px 8px #33415577 inset;
}
.map-section {
    flex: 2 1 0;
    min-width: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 12px #33415544);
}
#map {
    width: 100%;
    height: 95%;
    min-height: 500px;
    border-radius: 14px;
    box-shadow: 0 4px 20px 0 #33415577, 0 1.5px 8px #33415544 inset;
    border: 1px solid #1e293b;
    backdrop-filter: blur(1.5px);
    transition: box-shadow 0.3s;
}
#map:hover {
    box-shadow: 0 8px 32px 0 #33415599, 0 1.5px 8px #33415599 inset;
}
.table-section {
    background: rgba(22,28,38,0.97);
    border-radius: 14px;
    padding: 2.2rem 1.2rem;
    box-shadow: 0 2px 12px rgba(30,41,59,0.10);
    margin-top: 2.5rem;
    border: 1px solid #22313a;
    animation: floatIn 1.2s cubic-bezier(.68,-0.55,.27,1.55);
}
.table-section h3 {
    color: #38bdf8;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 1rem;
    text-shadow: 0 0 4px #0ea5e9, 0 2px 8px #1e293b;
}
.table-section table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 1rem;
    background: rgba(22,28,38,0.93);
    border-radius: 10px;
    overflow: hidden;
    font-size: 1.05rem;
    box-shadow: 0 1px 4px rgba(30,41,59,0.08);
}
.table-section th, .table-section td {
    padding: 0.9rem 0.7rem;
    text-align: center;
    border: 1px solid #334;
    color: #e2e8f0;
    font-size: 1.05rem;
    font-weight: 500;
    background: rgba(34,49,58,0.85);
    transition: background 0.2s;
}
.table-section th {
    background: linear-gradient(90deg, #22313a 80%, #334155 100%);
    color: #fff;
    font-size: 1.10rem;
    font-weight: 700;
    letter-spacing: 1px;
    border-bottom: 2px solid #334155;
}
.table-section tr:hover td {
    background: rgba(59,130,246,0.06);
}
hr {
    border: none;
    border-top: 1px solid #334155;
    margin: 2rem 0 1.5rem 0;
    opacity: 0.12;
}
.button, .return-dashboard-btn {
    background: linear-gradient(90deg, #334155 0%, #0ea5e9 100%);
    color: #e0f2fe;
    font-weight: bold;
    font-size: 1.08rem;
    padding: 0.7rem 1.3rem;
    border-radius: 1.5rem;
    box-shadow: 0 2px 8px rgba(30,41,59,0.10);
    transition: background 0.3s, transform 0.1s, box-shadow 0.3s;
    border: none;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    letter-spacing: 1px;
    outline: none;
    cursor: pointer;
    filter: none;
}
.button:hover, .return-dashboard-btn:hover {
    background: linear-gradient(90deg, #0ea5e9 0%, #334155 100%);
    transform: scale(1.04);
    box-shadow: 0 4px 16px 0 #0ea5e955;
}
.return-dashboard-btn {
    position: fixed;
    right: 32px;
    bottom: 32px;
    z-index: 1000;
}
@media (max-width: 1200px) {
    .top-section { flex-direction: column; height: auto; }
    .side-chart, .map-section { width: 100%; min-width: 0; }
    #charts, #exceed_chart, #map { height: 260px; min-height: 180px; }
}
@media (max-width: 900px) {
    .analyze-container { padding: 2px; }
    .top-section { gap: 0.5rem; }
    .side-chart { flex: 1 1 0; min-width: 0; }
    .map-section { min-width: 0; }
    #charts, #exceed_chart, #map { height: 180px; min-height: 120px; }
    .return-dashboard-btn {
        right: 10px;
        bottom: 10px;
        padding: 0.6rem 1.1rem;
        font-size: 1rem;
    }
}
</style>
</head>
<body>
<div class="analyze-container">
    <h2>数据分析 - 重金属检测平台</h2>
    <div class="top-section">
        <div class="side-chart">
            <div id="charts"></div>
        </div>
        <div class="map-section">
            <div id="map"></div>
        </div>
        <div class="side-chart">
            <div id="exceed_chart"></div>
        </div>
    </div>
    <div class="table-section">
        <h3>上传数据列表</h3>
        <table>
            <tr><th>文件名称</th><th>上传时间</th><th>操作</th></tr>
            {% for data in user_data %}
            <tr>
                <td>{{ data.file_name or "手动录入" }}</td>
                <td>{{ data.upload_time }}</td>
                <td>
                    <a href="/view_data/{{ data.id }}" class="button">查看详情</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
<a href="/dashboard" class="return-dashboard-btn">返回看板</a>
<script>
    // 初始化地图
    var map = new AMap.Map('map', {
        zoom: 5,
        center: [105.8345, 34.3416] // 中国中心坐标
    });
    // 添加批量绿色标记（仅中国范围）
    var customPoints = [
        {city: '宁波', lat: 25.523836, lng: 122.622036},
        {city: '绵阳', lat: 32.243099, lng: 112.888760},
        {city: '宁波', lat: 29.996179, lng: 124.744859},
        {city: '北京', lat: 29.976437, lng: 118.274846},
        {city: '成都', lat: 43.524720, lng: 121.666111},
        {city: '宁波', lat: 43.904780, lng: 101.988752},
        {city: '大理', lat: 22.115434, lng: 109.771096},
        {city: '大理', lat: 35.938674, lng: 106.044997},
        {city: '南京', lat: 43.507463, lng: 100.585848},
        {city: '济南', lat: 36.336582, lng: 104.538140},
        {city: '宁波', lat: 44.548434, lng: 106.519985},
        {city: '青岛', lat: 30.253306, lng: 114.157183},
        {city: '宁波', lat: 25.694385, lng: 115.051176},
        {city: '洛阳', lat: 32.368152, lng: 115.077808},
        {city: '大理', lat: 30.094647, lng: 108.685749},
        {city: '杭州', lat: 37.441140, lng: 101.120714},
        {city: '宁波', lat: 28.245944, lng: 106.644102},
        {city: '宜昌', lat: 43.396203, lng: 111.066512},
        {city: '深圳', lat: 28.866637, lng: 118.733761},
        {city: '北京', lat: 34.324844, lng: 107.567740},
        {city: '绵阳', lat: 33.933370, lng: 105.833492},
        {city: '北京', lat: 30.601632, lng: 114.818788},
        {city: '杭州', lat: 28.448851, lng: 106.930824},
        {city: '绵阳', lat: 21.767467, lng: 124.428567},
        {city: '广州', lat: 41.963126, lng: 116.820089}
    ];
    customPoints.filter(function(p) {
        return p.lng >= 73 && p.lng <= 135 && p.lat >= 18 && p.lat <= 54;
    }).forEach(function(p) {
        var marker = new AMap.Marker({
            position: [p.lng, p.lat],
            title: p.city,
            icon: new AMap.Icon({
                image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png', // 绿色图标
                size: [32, 32]
            })
        });
        marker.setMap(map);
    });
    // 添加批量红色标记（仅中国范围）
    var redPoints = [
        {city: '青岛', lat: 23.724517, lng: 119.831871},
        {city: '成都', lat: 43.990480, lng: 115.619914},
        {city: '广州', lat: 44.115558, lng: 105.158787},
        {city: '广州', lat: 44.687982, lng: 111.417590},
        {city: '苏州', lat: 25.595449, lng: 110.005698},
        {city: '北京', lat: 39.989808, lng: 105.200396},
        {city: '济南', lat: 33.109353, lng: 102.397033},
        {city: '苏州', lat: 23.975912, lng: 112.834580},
        {city: '郑州', lat: 26.915120, lng: 119.054555},
        {city: '济南', lat: 41.226242, lng: 119.640056},
        {city: '大理', lat: 27.034203, lng: 101.365709},
        {city: '上海', lat: 31.973678, lng: 107.237551},
        {city: '济南', lat: 38.457299, lng: 112.833687},
        {city: '南京', lat: 26.450449, lng: 109.923116},
        {city: '苏州', lat: 36.618449, lng: 109.758438},
        {city: '武汉', lat: 26.101453, lng: 114.547958},
        {city: '大理', lat: 27.613378, lng: 105.253466},
        {city: '济南', lat: 37.418580, lng: 106.558239},
        {city: '济南', lat: 32.086331, lng: 114.295546},
        {city: '北京', lat: 42.955486, lng: 112.044768}
    ];
    redPoints.filter(function(p) {
        return p.lng >= 73 && p.lng <= 135 && p.lat >= 18 && p.lat <= 54;
    }).forEach(function(p) {
        var marker = new AMap.Marker({
            position: [p.lng, p.lat],
            title: p.city,
            icon: new AMap.Icon({
                image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png', // 红色图标
                size: [32, 32]
            })
        });
        marker.setMap(map);
    });
    var points = {{ (map_data or []) | tojson | safe }};
    var metal_stats = {{ (metal_stats or []) | tojson | safe }};
    var exceedStats = {{ (exceed_stats or {}) | tojson | safe }};
    
    // 确保变量是有效的
    if (typeof points !== 'object' || !Array.isArray(points)) {
        points = [];
    }
    if (typeof metal_stats !== 'object' || !Array.isArray(metal_stats)) {
        metal_stats = [];
    }
    if (typeof exceedStats !== 'object' || Array.isArray(exceedStats)) {
        exceedStats = {};
    }
    console.log('points:', points);
    console.log('metal_stats:', metal_stats);
    console.log('exceed_stats:', exceedStats);
    // 过滤无效经纬度并生成 marker
    var markers = [];
    if (points && Array.isArray(points)) {
        markers = points.map(function(point) {
            if (!point || typeof point.longitude !== 'number' || typeof point.latitude !== 'number' || isNaN(point.longitude) || isNaN(point.latitude)) {
                return null;
            }
            try {
                var marker = new AMap.Marker({
                    position: [point.longitude, point.latitude],
                    title: "检测点: " + (point.upload_time || ''),
                    icon: point.is_exceed
                        ? new AMap.Icon({ image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png', size: [32, 32] }) // 超标红色
                        : new AMap.Icon({ image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png', size: [32, 32] }) // 正常绿色
                });
                var info = '<b>' + (point.city || '') + '</b><br>时间: ' + (point.upload_time || '') +
                    (point.is_exceed ? '<br><span style="color:red;">超标: ' + (point.exceed_items && point.exceed_items.length ? point.exceed_items.join(', ') : '是') + '</span>' : '<br>全部正常');
                marker.on('click', function() {
                    var infoWindow = new AMap.InfoWindow({ content: info });
                    infoWindow.open(map, marker.getPosition());
                });
                return marker;
            } catch (e) {
                console.error('创建标记时出错:', e);
                return null;
            }
        }).filter(Boolean);
    }
    // 正确加载 MarkerClusterer 插件
    AMap.plugin('AMap.MarkerClusterer', function() {
        var cluster = new AMap.MarkerClusterer(map, markers, {
            gridSize: 80 // 可根据需要调整聚合粒度
        });
    });
    // 饼图
    try {
        var chartDom = document.getElementById('charts');
        if (chartDom) {
            var myChart = echarts.init(chartDom);
            var option = {
                title: { text: '污染种类统计', left: 'center', textStyle: { color: '#fff' } },
                tooltip: { trigger: 'item' },
                legend: { bottom: '0%', left: 'center', textStyle: { color: '#fff' } },
                series: [
                    {
                        name: '污染种类',
                        type: 'pie',
                        radius: '50%',
                        data: metal_stats || [],
                        emphasis: {
                            itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' }
                        },
                        label: { color: '#fff' }
                    }
                ]
            };
            myChart.setOption(option);
        }
    } catch (e) {
        console.error('饼图渲染失败:', e);
    }
    
    // 柱状图
    try {
        var metals = exceedStats ? Object.keys(exceedStats) : [];
        var values = metals.map(function(m){ return exceedStats[m] || 0; });
        var exceedChartDom = document.getElementById('exceed_chart');
        if (exceedChartDom) {
            var exceedChart = echarts.init(exceedChartDom);
            var exceedOption = {
                title: { text: '各金属超标次数', left: 'center', textStyle: { color: '#fff' } },
                xAxis: { type: 'category', data: metals, axisLabel: { color: '#fff' } },
                yAxis: { type: 'value', axisLabel: { color: '#fff' } },
                series: [{
                    data: values,
                    type: 'bar',
                    itemStyle: { color: '#e74c3c' }
                }],
                tooltip: { trigger: 'axis' },
                grid: { left: 40, right: 20, bottom: 40, top: 40 }
            };
            exceedChart.setOption(exceedOption);
        }
    } catch (e) {
        console.error('柱状图渲染失败:', e);
    }
</script>
</body>
</html>
